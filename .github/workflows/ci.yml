name: CI

# Runs on every push to master (the deploy branch) and on PRs targeting it.
# The `test` job (tsc + vitest, incl. the scoring golden-master / cross-surface
# / invariant suites) posts a COMMIT STATUS `ci/test` (success/failure) at the
# end — the Vercel "Ignored Build Step" gate reads that status (it needs only a
# "Commit statuses" token, not "Checks"). See scripts/vercel-ignored-build-step.mjs.
# The `e2e` job runs for visibility but does NOT post a status / block the deploy
# (Playwright drives a dev server and can flake); widen the gate later if wanted.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write   # post the ci/test commit status the deploy gate reads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        run: npm test

      # Mirror this job's result into a commit status the Vercel deploy gate
      # reads (GitHub Actions otherwise only exposes results as check runs).
      - name: Post ci/test status — success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","context":"ci/test","description":"tsc + vitest passed"}'
      - name: Post ci/test status — failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","context":"ci/test","description":"tsc + vitest failed"}'

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright)
        run: npm run e2e
